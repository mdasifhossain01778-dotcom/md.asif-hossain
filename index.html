            100% { background-position: 0% 50%; }

        /* ✨ Glassmorphism Design */
        .glass-card {

            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);

        /* 🖱️ Custom Mouse Cursor */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease, background 0.2s ease;
            transform: translate(-50%, -50%);
        }
        .cursor-follower {
            width: 8px;
            height: 8px;
            background: #3b82f6;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .mono-clock { font-family: 'Share Tech Mono', monospace; }
        .euro-font { font-family: 'Cinzel', serif; }

        .zoom-hover {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
        }
        .zoom-hover:hover {
            transform: scale(1.03) translateY(-2px);
        }

        /* 🌌 3D Effects */
        .tilt-card {
            transform-style: preserve-3d;
            perspective: 1000px;
            transition: transform 0.3s ease;
        }

        @keyframes periodicBounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
            60% { transform: translateY(-4px); }
        }
        .bounce-whatsapp { animation: periodicBounce 3s infinite ease-in-out; }

        @keyframes mapPinBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .bounce-pin { animation: mapPinBounce 1.8s infinite ease-in-out; }

        @keyframes pingGlow {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .pulse-ring { animation: pingGlow 2s infinite ease-out; }

        .profile-shine-container {
            position: relative;
            overflow: hidden;
        }
        .profile-shine-container::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(60deg, transparent 30%, rgba(255, 255, 255, 0.7) 50%, transparent 70%);
            transform: rotate(30deg);
            animation: periodicShine 5s infinite;
        }
        @keyframes periodicShine {
            0% { transform: translateX(-150%) rotate(30deg); }
            20% { transform: translateX(150%) rotate(30deg); }
            100% { transform: translateX(150%) rotate(30deg); }
        }

        @keyframes marqueeFlight {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marqueeFlight 25s linear infinite;
        }

        .review-fade { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }

        /* Hero Video Background */

            top: 0;
            left: 0;
            width: 100%;

    <script>
        // 💫 Hide Page Loader after load
        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.visibility = 'hidden', 600);
            startCounters();
        });

        // 📖 Reading Progress Bar
        window.addEventListener('scroll', () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById('reading-progress').style.width = scrolled + '%';

            // Scroll-to-Top Button visibility
            const btn = document.getElementById('scrollTopBtn');
            if (winScroll > 300) {
                btn.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                btn.classList.add('opacity-0', 'pointer-events-none');
            }
        });

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 🖱️ Custom Mouse Cursor
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            follower.style.left = e.clientX + 'px';
            follower.style.top = e.clientY + 'px';
        });

        // ⌨️ Typing Text Effect
        const typingWords = ["Digital Marketing Specialist", "High-Fidelity UI/UX Designer", "Technical SEO Expert", "Full-Funnel Growth Architect"];
        let wordIndex = 0, charIndex = 0, isDeleting = false;
        function typeEffect() {
            const currentWord = typingWords[wordIndex];
            const target = document.getElementById('typing-text');
            if (isDeleting) {
                target.textContent = currentWord.substring(0, charIndex--);
            } else {
                target.textContent = currentWord.substring(0, charIndex++);
            }

            if (!isDeleting && charIndex === currentWord.length + 1) {
                isDeleting = true;
                setTimeout(typeEffect, 1500);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % typingWords.length;
                setTimeout(typeEffect, 500);
            } else {
                setTimeout(typeEffect, isDeleting ? 50 : 100);
            }
        }
        document.addEventListener("DOMContentLoaded", typeEffect);

        // 📊 Animated Counter Function
        function startCounters() {
            const counters = document.querySelectorAll('.counter');
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                let count = 0;
                const speed = target / 50;
                const updateCount = () => {
                    count += speed;
                    if (count < target) {
                        counter.innerText = Math.ceil(count);
                        setTimeout(updateCount, 30);
                    } else {
                        counter.innerText = target + "+";
                    }
                };
                updateCount();
            });
        }

        // 🌙 Theme Switcher Logic
        const themes = ['theme-cream', 'theme-dark', 'theme-gradient', 'theme-light-blue', 'theme-white'];
        let currentThemeIdx = 0;
        function cycleTheme() {
            document.body.classList.remove(themes[currentThemeIdx]);
            currentThemeIdx = (currentThemeIdx + 1) % themes.length;
            document.body.classList.add(themes[currentThemeIdx]);
        }

        // 💰 Price Calculator
        function calculatePrice() {
            let total = 0;
            document.querySelectorAll('.service-calc:checked').forEach(cb => {
                total += parseInt(cb.value);
            });
            document.getElementById('total-price').innerText = '$' + total;
        }

        // Clocks Logic
        function updateClocks() {
            const now = new Date();
            const bdTime = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Dhaka" }));
            const euTime = new Date(now.toLocaleString("en-US", { timeZone: "Europe/London" }));

            document.getElementById('clock-bd').innerText = bdTime.toLocaleTimeString();
            document.getElementById('clock-eu').innerText = euTime.toLocaleTimeString();
        }
        setInterval(updateClocks, 1000);
        updateClocks();

        // Modals & Chat Handlers
        function openCVModal() { document.getElementById('cv-modal').classList.remove('hidden'); document.getElementById('cv-modal').classList.add('flex'); }
        function closeCVModal() { document.getElementById('cv-modal').classList.add('hidden'); document.getElementById('cv-modal').classList.remove('flex'); }
        function toggleChat() { 
            const win = document.getElementById('chat-window');
            win.classList.toggle('hidden'); 
            win.classList.toggle('flex');
        }
        function sendChatMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;
            const container = document.getElementById('chat-messages');
            container.innerHTML += `<div class="bg-blue-600 text-white p-2 rounded-lg max-w-[85%] ml-auto">${msg}</div>`;
            input.value = '';
            setTimeout(() => {
                container.innerHTML += `<div class="bg-purple-100 text-purple-900 p-2 rounded-lg max-w-[85%]">Thanks for your message! Asif's team will contact you shortly.</div>`;
                container.scrollTop = container.scrollHeight;
            }, 800);
        }
