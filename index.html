<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Wishes - HSC 2026</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for beautiful Bengali text -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="max-w-xl w-full bg-white/10 backdrop-blur-md rounded-2xl p-6 md:p-8 shadow-2xl border border-white/20 text-center text-white transform transition-all duration-300 hover:scale-[1.01]">
        
        <!-- HSC Batch Badge -->
        <div class="inline-block bg-amber-500/20 text-amber-300 border border-amber-500/30 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider mb-4">
            📢 Attention: HSC 2026 Candidates
        </div>

        <!-- Main Heading and Wish -->
        <div class="mb-8">
            <h1 class="text-2xl md:text-3xl font-bold leading-relaxed tracking-wide">
                আগামী ২৪ জুলাই শুক্রবার আমাদের পরীক্ষার জন্য সবার প্রতি শুভকামনা! 🎯
            </h1>
            
            <!-- Creator Mention -->
            <p class="text-slate-300 mt-4 text-sm md:text-base border-t border-b border-white/10 py-2 inline-block px-4 mx-auto">
                <i class="fa-solid fa-pen-nib text-cyan-400 mr-1"></i> 
                Best wishes from <span class="font-semibold text-cyan-300">MD. Asif Hossain</span> to all <span class="text-pink-400 font-semibold">HSC 2026 Candidates</span>!
            </p>
            
            <p class="text-slate-400 mt-6 text-xs md:text-sm uppercase tracking-widest">নিচের যেকোনো একটি অপশন সিলেক্ট করো:</p>
        </div>

        <!-- Options Container -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <!-- Option 1 Card -->
            <button onclick="showResult('brilliant')" class="group relative overflow-hidden bg-gradient-to-r from-cyan-500 to-blue-600 p-5 rounded-xl font-semibold shadow-lg hover:shadow-cyan-500/20 transition-all duration-300 hover:-translate-y-1 cursor-pointer text-left">
                <span class="block text-xs text-cyan-200 uppercase tracking-wider mb-1">Option 1</span>
                <span class="text-lg font-bold block">For Brilliant Student</span>
                <div class="absolute right-3 bottom-3 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-brain text-5xl"></i>
                </div>
            </button>

            <!-- Option 2 Card -->
            <button onclick="showResult('regular')" class="group relative overflow-hidden bg-gradient-to-r from-emerald-500 to-teal-600 p-5 rounded-xl font-semibold shadow-lg hover:shadow-emerald-500/20 transition-all duration-300 hover:-translate-y-1 cursor-pointer text-left">
                <span class="block text-xs text-emerald-200 uppercase tracking-wider mb-1">Option 2</span>
                <span class="text-lg font-bold block">For Regular Student</span>
                <div class="absolute right-3 bottom-3 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-book-open text-5xl"></i>
                </div>
            </button>
        </div>

        <!-- Dynamic Output Section -->
        <div id="resultBox" class="hidden min-h-[120px] flex flex-col items-center justify-center bg-white/5 rounded-xl p-6 border border-white/10 transition-all duration-500 transform scale-95 opacity-0">
            <div id="resultIcon" class="text-4xl mb-3"></div>
            <p id="resultText" class="text-xl font-semibold tracking-wide"></p>
        </div>

    </div>

    <!-- JavaScript to handle clicks -->
    <script>
        function showResult(type) {
            const resultBox = document.getElementById('resultBox');
            const resultIcon = document.getElementById('resultIcon');
            const resultText = document.getElementById('resultText');

            // Reset classes for smooth animation trigger
            resultBox.classList.remove('scale-100', 'opacity-100', 'hidden');
            resultBox.classList.add('scale-95', 'opacity-0');

            setTimeout(() => {
                if (type === 'brilliant') {
                    resultIcon.innerHTML = '<i class="fa-solid fa-smile-beam text-amber-400 animate-pulse"></i> <i class="fa-solid fa-heart text-rose-500 animate-beat"></i>';
                    resultText.innerHTML = 'No Tension & ❤️';
                    resultText.className = "text-xl font-bold text-amber-300";
                } else if (type === 'regular') {
                    resultIcon.innerHTML = '<i class="fa-solid fa-dumbbell text-emerald-400 animate-spin-slow"></i>';
                    resultText.innerHTML = 'Try to hard work!';
                    resultText.className = "text-xl font-bold text-emerald-300";
                }
                
                // Show with animation
                resultBox.classList.remove('scale-95', 'opacity-0');
                resultBox.classList.add('scale-100', 'opacity-100');
            }, 150);
        }
    </script>

    <!-- Extra CSS for minor icon animations -->
    <style>
        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .animate-beat {
            display: inline-block;
            animation: beat 1s infinite;
        }
        .animate-spin-slow {
            display: inline-block;
            animation: spin 3s linear infinite;
        }
    </style>
</body>
</html>
